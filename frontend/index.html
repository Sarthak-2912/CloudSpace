<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudSpace - File Sharing</title>
    <link rel="stylesheet" href="./styles.css">
    <style>
        /* Emergency fallback styles */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            background: #f8f9fa;
        }
        #app {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <script src="./config.js"></script>
    <script src="./api.js"></script>
    <script src="./auth.js"></script>
    <script src="./app.js"></script>
    <div id="file-info-modal" class="modal" style="display: none;">
    <div class="modal-content">
      <div class="modal-header">
        <h3>File Details</h3>
        <button class="modal-close" onclick="app.closeFileInfo()">&times;</button>
      </div>
      <div id="file-info-content" style="padding: 10px;">
        <!-- Dynamic content will come here -->
      </div>
    </div>
</div>
</body>
</html>
